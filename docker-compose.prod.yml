services:
  frontend:
    environment:
      - NODE_ENV=production
      # In production, browser calls backend through reverse proxy path.
      - NEXT_PUBLIC_API_MODE=proxy
      - NEXT_PUBLIC_API_PROXY_PATH=/api
      - INTERNAL_API_URL=http://backend:8000
    command: sh -c "npm run build && npm run start -- --hostname 0.0.0.0 --port 3000"
    # Disable source bind mounts and dev caches in production runtime.
    volumes: []
