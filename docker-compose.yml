version: '3.8'

# ===================================
# NEWS LENS - MULTI-SERVICE STACK
# ===================================
# This orchestrates core components:
# - Ollama (local LLM with GPU support)
# - ChromaDB (vector database)
# - Backend (FastAPI RAG service)
# Note: Frontend commented out until Dockerfile is created

services:
  # ----------------------------------
  # OLLAMA - Local LLM with GPU
  # ----------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: news-lens-ollama
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - news-lens-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ----------------------------------
  # CHROMADB - Vector Database
  # ----------------------------------
  chromadb:
    image: chromadb/chroma:latest
    container_name: news-lens-chromadb
    volumes:
      - ./chromadb/data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=False
    networks:
      - news-lens-network
    # NOTE: Port 8000 is NOT exposed to host (security best practice)
    # Other services access via internal DNS: chromadb:8000
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8000/api/v2"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ----------------------------------
  # BACKEND - FastAPI RAG Service
  # ----------------------------------
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: news-lens-backend
    restart: always
    depends_on:
      - chromadb
      - ollama
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      # Ollama Configuration
      - OLLAMA_HOST=ollama
      - OLLAMA_PORT=11434
      - OLLAMA_LLM_MODEL=qwen3.5:4b
      - OLLAMA_EMBEDDING_MODEL=mxbai-embed-large
      # RAG Configuration
      - RAG_TOP_K=${RAG_TOP_K:-5}
      - RAG_TEMPERATURE=${RAG_TEMPERATURE:-0.7}
      - RAG_MAX_TOKENS=${RAG_MAX_TOKENS:-500}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    networks:
      - news-lens-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ----------------------------------
  # FRONTEND - Next.js UI (Commented - No Dockerfile yet)
  # ----------------------------------
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: news-lens-frontend
  #   restart: always
  #   depends_on:
  #     - backend
  #   environment:
  #     - NEXT_PUBLIC_API_URL=http://localhost:${BACKEND_PORT}
  #   ports:
  #     - "${FRONTEND_PORT}:3000"
  #   networks:
  #     - news-lens-network

networks:
  news-lens-network:
    driver: bridge

volumes:
  ollama-data:
  chromadb-data:
